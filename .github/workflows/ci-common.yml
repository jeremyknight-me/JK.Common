name: 'Common CI'

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - 'src/Common/**'
      - 'src/Common.Tests/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/Common/**'
      - 'src/Common.Tests/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          10.x
          9.x
          8.x
    - name: Build 
      run: dotnet build ./src/Common/JK.Common.csproj -c Release 
    - name: Test 
      run: dotnet test ./src/Common.Tests/JK.Common.Tests.csproj --verbosity normal
